<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau 대시보드 — Lee Sieun</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --text: #1e1e2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --white: #ffffff;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    nav {
      position: sticky; top: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 100; padding: 0 2rem;
    }
    nav .nav-inner {
      display: flex; align-items: center; gap: 1rem;
      max-width: 900px; margin: 0 auto; padding: 1rem 0;
    }
    nav a { text-decoration: none; color: var(--muted); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    nav a:hover { color: var(--primary); }
    nav .sep { color: var(--border); }

    .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }

    /* Header */
    .page-header {
      background: var(--white);
      padding: 4rem 0 3rem;
      border-bottom: 1px solid var(--border);
    }
    .page-type {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 0.8rem;
    }
    .page-header h1 {
      font-size: 2.2rem; font-weight: 800;
      letter-spacing: -0.02em; margin-bottom: 0.6rem;
    }
    .page-header p { font-size: 1rem; color: var(--muted); }

    /* Dashboard list */
    .dashboard-list {
      padding: 3rem 0;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .dashboard-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .dashboard-item:hover {
      box-shadow: 0 4px 20px rgba(79,70,229,0.08);
    }

    .dashboard-meta {
      padding: 1.4rem 1.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .dashboard-meta h2 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: normal;
      text-transform: none;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .dashboard-meta p {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .tag-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .tag {
      font-size: 0.75rem; font-weight: 500;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--muted); padding: 0.2rem 0.6rem; border-radius: 6px;
    }
    .tag-selfstudy {
      font-size: 0.75rem; font-weight: 600;
      background: #fef3c7; border: 1px solid #fde68a;
      color: #92400e; padding: 0.2rem 0.6rem; border-radius: 6px;
    }

    .open-link {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--primary);
      border-radius: 8px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .open-link:hover { background: var(--primary-light); }

    .dashboard-embed {
      border-top: 1px solid var(--border);
      position: relative;
      width: 100%;
      padding-bottom: 56%;
    }
    .dashboard-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    footer {
      text-align: center;
      padding: 2.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
